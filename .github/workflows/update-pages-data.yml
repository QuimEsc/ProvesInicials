name: Update dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches:
      - main
    paths:
      - build_pages_data.py
      - data_manager.py
      - logic_blue.py
      - logic_lines.py
      - logic_ratio.py
      - logic_red.py
      - llista_tickers.csv
      - requirements.txt
      - .github/workflows/update-pages-data.yml
      - dades_historiques/**

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    env:
      ENABLE_DATA_MANAGER_LOGS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create data folder if missing
        run: mkdir -p dades_historiques

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build static JSON data
        run: python build_pages_data.py --base-dir . --output-dir docs/data --force-refresh

      - name: Commit generated files and updated CSV history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data dades_historiques
          if git diff --staged --quiet; then
            echo "No hi ha canvis per a fer commit"
          else
            git commit -m "chore: update dashboard data and historical csv"
            git push
          fi
